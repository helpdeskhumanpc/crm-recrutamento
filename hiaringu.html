<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヒアリングシート</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Helvetica Neue',Arial,sans-serif; background:#f5f5f5; padding:20px; }
    .topbar { display:flex; align-items:center; gap:10px; background:white; padding:12px 20px; border-radius:8px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.1); flex-wrap:wrap; }
    .topbar h1 { font-size:17px; color:#00695c; flex:1; }
    .btn { padding:8px 18px; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:600; }
    .btn-save  { background:#1e88e5; color:white; }
    .btn-print { background:#e8621a; color:white; }
    .btn-back  { background:#f5f5f5; color:#555; border:1px solid #ddd; }
    .candidate-name { font-size:14px; color:#555; padding:6px 12px; background:#e0f2f1; border-radius:4px; }
    .save-status { font-size:12px; padding:4px 10px; border-radius:4px; white-space:nowrap; }
    .save-status.saving  { color:#888; }
    .save-status.success { color:#2e7d32; background:#e8f5e9; }
    .save-status.error   { color:#c62828; background:#ffebee; font-weight:700; }

    .card { background:white; border-radius:8px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; }
    .card-title { background:#00695c; color:white; padding:10px 16px; font-size:13px; font-weight:700; }

    /* 4 colunas: pergunta | resposta | pergunta | resposta */
    .card-body { display:grid; grid-template-columns:165px 1fr 165px 1fr; gap:0; }

    .field {
      grid-column:span 2;
      display:grid; grid-template-columns:165px 1fr;
      align-items:start; gap:8px;
      padding:6px 10px; border-bottom:1px solid #f0f0f0;
    }
    .field.full { grid-column:span 4; }
    .field:last-child { border-bottom:none; }

    .field > label {
      font-size:10px; color:#004d40; font-weight:700;
      background:#e0f2f1; padding:3px 8px; border-radius:3px;
      border-left:3px solid #00695c; align-self:start;
      margin-top:3px; line-height:1.4; display:block;
    }
    .field input, .field select, .field textarea {
      width:100%; padding:5px 4px; border:none;
      border-bottom:2px solid #b2dfdb; border-radius:0;
      font-size:13px; color:#1565c0; font-weight:600; background:transparent;
    }
    .field input[disabled], .field select[disabled] { color:#555; font-weight:400; border-bottom-color:#e0e0e0; }
    .field textarea { resize:vertical; min-height:44px; }
    .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-bottom-color:#00695c; background:#f9fffe; }

    .radio-row { display:flex; gap:12px; flex-wrap:wrap; padding-top:4px; }
    .radio-row label { display:flex; align-items:center; gap:4px; font-size:13px; font-weight:normal; cursor:pointer; color:#333; }

    /* Alertas vermelho */
    .radio-row label:has(input[value="不可"]:checked),
    .radio-row label:has(input[name="tattoo_umu"][value="あり"]:checked),
    .radio-row label:has(input[name="genshoku_umu"][value="なし"]:checked),
    .radio-row label:has(input[name="kotai_keiken"][value="なし"]:checked) { color:#c62828; font-weight:700; }
    #jp_kaiwa:has(option[value="2.0"]:checked),
    #hiragana_yomi:has(option[value="読み"]:checked), #hiragana_yomi:has(option[value="読めない"]:checked),
    #katakana_yomi:has(option[value="読み"]:checked), #katakana_yomi:has(option[value="読めない"]:checked) { color:#c62828; font-weight:700; }

    .print-date { display:none; }
    .print-only { display:none !important; }
    .print-footer { display:none; }
    .loading { text-align:center; padding:40px; color:#aaa; }

    @media (max-width:768px) {
      .card-body { grid-template-columns:110px 1fr; }
      .field, .field.full { grid-column:span 1; grid-template-columns:110px 1fr; }
    }

    /* PRINT */
    @page { margin:8mm 8mm 14mm 8mm; }
    @media print {
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      body { background:white; padding:0; font-size:8pt; font-family:'MS Gothic',Arial,sans-serif; }
      .topbar { display:none; }
      .print-header { display:block !important; border-bottom:2px solid #00695c; margin-bottom:6px; padding-bottom:3px; }
      .print-header h1 { font-size:13pt; font-weight:900; color:#00695c; display:block; margin-bottom:2px; }
      .print-header .ph-meta { display:block; font-size:8pt; color:#333; }
      .card { box-shadow:none; border:1px solid #aaa; margin-bottom:3px; border-radius:0; page-break-inside:avoid; }
      .card-title { background:#b2dfdb !important; color:#00695c !important; padding:2px 6px; font-size:8pt; }
      .card-body { display:grid; grid-template-columns:110px 1fr 110px 1fr; gap:0; }
      .field { grid-column:span 2; display:grid; grid-template-columns:110px 1fr; gap:4px; padding:2px 4px; border-bottom:1px solid #e8e8e8; align-items:start; }
      .field.full { grid-column:span 4; grid-template-columns:110px 1fr; }
      .field > label { font-size:6.5pt; background:#e0f2f1 !important; color:#004d40 !important; padding:1px 5px; border-left:2px solid #00695c; border-radius:2px; font-weight:700; align-self:start; margin-top:1px; line-height:1.3; }
      .field input, .field select, .field textarea { font-size:8pt; color:#1565c0; font-weight:600; border:none; border-bottom:1px solid #bbb; padding:1px 2px; background:transparent; width:100%; }
      .field input[disabled], .field select[disabled] { color:#444; font-weight:400; border-bottom-color:#ddd; }
      .field:has(input[id$="_hantei"]) > label { background:#e8f5e9 !important; border-left-color:#2e7d32; }
      .field input[type="date"], .field input[type="month"] { display:none; }
      .print-date { display:block; border-bottom:1px solid #bbb; padding:1px 2px; font-size:8pt; color:#1565c0; font-weight:600; min-height:1.2em; }
      .print-only { display:grid !important; }
      .print-hide { display:none !important; }
      .radio-row { gap:6px; padding-top:1px; }
      .radio-row label { font-size:8pt; }
      .radio-row label:has(input:checked) { color:#1565c0; font-weight:700; }
      #kyuyo_kibou_riyu { min-height:36px; }
      .print-footer { display:block; position:fixed; bottom:0; left:0; right:0; font-size:7pt; color:#999; text-align:center; padding-top:2px; border-top:1px solid #ddd; }
    }
    .print-header { display:none; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🎙 ヒアリングシート</h1>
  <span class="candidate-name" id="candidateName">読み込み中...</span>
  <span class="save-status" id="saveStatus"></span>
  <button class="btn btn-back" onclick="salvarEFechar()">💾 保存して閉じる</button>
  <button class="btn btn-save" onclick="salvar()">💾 保存</button>
  <button class="btn btn-print" onclick="window.print()">🖨 印刷</button>
</div>

<!-- PRINT HEADER -->
<div class="print-header" id="printHeader">
  <h1>ヒアリングシート</h1>
  <div class="ph-meta" id="printMeta"></div>
</div>

<div id="content"><div class="loading">読み込み中...</div></div>

<!-- PRINT FOOTER -->
<div class="print-footer" id="printFooter"></div>

<script>
const { createClient } = supabase
const sb = createClient('https://xzxfwrbebkwagnropgfb.supabase.co','sb_publishable_rPu8_l2pdy3XtOTAus6Mxw_rp2HO_XE')

let hiariguId = null
let candidateId = null

function g(id) { return document.getElementById(id)?.value || null }
function r(name) { const el = document.querySelector(`input[name="${name}"]:checked`); return el?.value || null }
function set(id, val) { const el = document.getElementById(id); if (el) el.value = val || '' }
function setR(name, val) { const el = document.querySelector(`input[name="${name}"][value="${val}"]`); if (el) el.checked = true }

async function carregar() {
  const params = new URLSearchParams(location.search)
  candidateId = params.get('id')
  if (!candidateId) { document.getElementById('content').innerHTML = '<div class="loading">ID não informado.</div>'; return }

  const [resCand, resHia] = await Promise.all([
    sb.from('candidates').select('shimei,telefone,shokai,nacionalidade,visa,data_nascimento,idade').eq('id', candidateId).single(),
    sb.from('hiaringu').select('*').eq('candidate_id', candidateId).order('updated_at', { ascending: false }).limit(1)
  ])

  const cand = resCand.data
  const hia  = resHia.data?.[0] || null

  if (cand) {
    document.getElementById('candidateName').textContent = `${cand.shimei || ''} (${cand.telefone || ''})`
    document.getElementById('printMeta').textContent = `氏名: ${cand.shimei || ''} / TEL: ${cand.telefone || ''}`
    document.getElementById('printFooter').textContent = cand.shimei || ''
  }

  if (hia) hiariguId = hia.id
  renderForm(hia || {}, cand || {})
  document.getElementById('shokaiSha').textContent = cand?.shokai || ''
}

function formatDateJP(dateStr) {
  if (!dateStr) return ''
  const [y, m, d] = dateStr.split('-')
  if (!y || !m || !d) return ''
  return `${y}年${parseInt(m,10)}月${parseInt(d,10)}日`
}

function formatMonthJP(monthStr) {
  if (!monthStr) return ''
  const [y, m] = monthStr.split('-')
  if (!y || !m) return ''
  return `${y}年${parseInt(m,10)}月`
}

function syncPrintDates() {
  document.querySelectorAll('#content .field').forEach(field => {
    const input = field.querySelector('input[type="date"], input[type="month"]')
    const span = field.querySelector('.print-date')
    if (!input || !span) return
    span.textContent = input.type === 'month' ? formatMonthJP(input.value) : formatDateJP(input.value)
  })
}
window.addEventListener('beforeprint', syncPrintDates)

function renderForm(h, cand = {}) {
  document.getElementById('content').innerHTML = `

  <!-- 面談情報 -->
  <div class="card">
    <div class="card-title">面談情報</div>
    <div class="card-body">
      <div class="field">
        <label>ヒアリング日 <span style="color:#00695c;font-size:9px">→ 見学・ヒアリング 自動反映</span></label>
        <div><input type="date" id="hiaringu_bi" value="${h.hiaringu_bi||''}"><span class="print-date">${formatDateJP(h.hiaringu_bi)}</span></div>
      </div>
      <div class="field">
        <label>入社予定日 <span style="color:#00695c;font-size:9px">→ 入社 自動反映</span></label>
        <div><input type="date" id="nyusha_yotei_bi" value="${h.nyusha_yotei_bi||''}"><span class="print-date">${formatDateJP(h.nyusha_yotei_bi)}</span></div>
      </div>
      <div class="field">
        <label>面談日</label>
        <div><input type="date" id="mensadan_bi" value="${h.mensadan_bi||''}"><span class="print-date">${formatDateJP(h.mensadan_bi)}</span></div>
      </div>
      <div class="field">
        <label>面談者</label>
        <input type="text" id="mensadan_sha" value="${h.mensadan_sha||''}" placeholder="担当者名">
      </div>
      <div class="field">
        <label>国籍</label>
        <input type="text" value="${cand.nacionalidade||''}" disabled>
      </div>
      <div class="field print-hide">
        <label>生年月日</label>
        <input type="text" value="${formatDateJP(cand.data_nascimento)}" disabled>
      </div>
      <div class="field">
        <label>年齢</label>
        <input type="text" value="${cand.idade!=null ? cand.idade+'歳' : ''}" disabled>
      </div>
      <div class="field">
        <label>ビザ</label>
        <input type="text" value="${cand.visa||''}" disabled>
      </div>
      <div class="field print-only">
        <label>紹介者</label>
        <span class="print-date" id="shokaiSha"></span>
      </div>
    </div>
  </div>

  <!-- 日本語力 -->
  <div class="card">
    <div class="card-title">日本語力</div>
    <div class="card-body">
      <div class="field">
        <label>会話レベル</label>
        <select id="jp_kaiwa">
          <option value="">選択</option>
          <option value="4.0" ${h.jp_kaiwa==='4.0'?'selected':''}>4.0（高卒レベル）</option>
          <option value="3.0" ${h.jp_kaiwa==='3.0'?'selected':''}>3.0（流暢に話す）</option>
          <option value="2.5" ${h.jp_kaiwa==='2.5'?'selected':''}>2.5（言葉を選べば可）</option>
          <option value="2.0" ${h.jp_kaiwa==='2.0'?'selected':''}>2.0（かたこと）</option>
        </select>
      </div>
      <div class="field">
        <label>漢字</label>
        <select id="kanji_yomi">
          <option value="">選択</option>
          <option value="読み書き" ${h.kanji_yomi==='読み書き'?'selected':''}>読み書き</option>
          <option value="読み" ${h.kanji_yomi==='読み'?'selected':''}>読み</option>
          <option value="読めない" ${h.kanji_yomi==='読めない'?'selected':''}>読めない</option>
        </select>
      </div>
      <div class="field">
        <label>ひらがな</label>
        <select id="hiragana_yomi">
          <option value="">選択</option>
          <option value="読み書き" ${h.hiragana_yomi==='読み書き'?'selected':''}>読み書き</option>
          <option value="読み" ${h.hiragana_yomi==='読み'?'selected':''}>読み</option>
          <option value="読めない" ${h.hiragana_yomi==='読めない'?'selected':''}>読めない</option>
        </select>
      </div>
      <div class="field">
        <label>カタカナ</label>
        <select id="katakana_yomi">
          <option value="">選択</option>
          <option value="読み書き" ${h.katakana_yomi==='読み書き'?'selected':''}>読み書き</option>
          <option value="読み" ${h.katakana_yomi==='読み'?'selected':''}>読み</option>
          <option value="読めない" ${h.katakana_yomi==='読めない'?'selected':''}>読めない</option>
        </select>
      </div>
      <div class="field full">
        <label>コメント</label>
        <textarea id="jp_comment" rows="2">${h.jp_comment||''}</textarea>
      </div>
      <div class="field">
        <label>判定</label>
        <input type="text" id="jp_hantei" value="${h.jp_hantei||''}">
      </div>
    </div>
  </div>

  <!-- 身体・健康 -->
  <div class="card">
    <div class="card-title">身体・健康</div>
    <div class="card-body">
      <div class="field">
        <label>視力（裸眼）右</label>
        <input type="text" id="shiryoku_migi" value="${h.shiryoku_migi||''}">
      </div>
      <div class="field">
        <label>視力（裸眼）左</label>
        <input type="text" id="shiryoku_hidari" value="${h.shiryoku_hidari||''}">
      </div>
      <div class="field">
        <label>メガネ・コンタクト 右</label>
        <input type="text" id="megane_migi" value="${h.megane_migi||''}">
      </div>
      <div class="field">
        <label>メガネ・コンタクト 左</label>
        <input type="text" id="megane_hidari" value="${h.megane_hidari||''}">
      </div>
      <div class="field">
        <label>利き手</label>
        <div class="radio-row">
          <label><input type="radio" name="kikite" value="右" ${h.kikite==='右'?'checked':''}> 右</label>
          <label><input type="radio" name="kikite" value="左" ${h.kikite==='左'?'checked':''}> 左</label>
        </div>
      </div>
      <div class="field">
        <label>判定</label>
        <input type="text" id="shintai_hantei" value="${h.shintai_hantei||''}">
      </div>
      <div class="field full">
        <label>既往歴・通院中の病気・最後に受診した日理由</label>
        <textarea id="kiourekki" rows="2">${h.kiourekki||''}</textarea>
      </div>
    </div>
  </div>

  <!-- タトゥー -->
  <div class="card">
    <div class="card-title">タトゥー</div>
    <div class="card-body">
      <div class="field">
        <label>タトゥーの有無</label>
        <div class="radio-row">
          <label><input type="radio" name="tattoo_umu" value="あり" ${h.tattoo_umu==='あり'?'checked':''}> あり</label>
          <label><input type="radio" name="tattoo_umu" value="なし" ${h.tattoo_umu==='なし'?'checked':''}> なし</label>
        </div>
      </div>
      <div class="field">
        <label>タトゥーの場所</label>
        <input type="text" id="tattoo_basho" value="${h.tattoo_basho||''}">
      </div>
      <div class="field">
        <label>服・化粧で対応できるか</label>
        <input type="text" id="tattoo_taiou" value="${h.tattoo_taiou||''}">
      </div>
      <div class="field">
        <label>判定</label>
        <input type="text" id="tattoo_hantei" value="${h.tattoo_hantei||''}">
      </div>
    </div>
  </div>

  <!-- 家族 -->
  <div class="card">
    <div class="card-title">家族について</div>
    <div class="card-body">
      <div class="field full">
        <label>同居の家族（独身/既婚・配偶者・子供・病院対応など）</label>
        <textarea id="doukyo_kazoku" rows="3">${h.doukyo_kazoku||''}</textarea>
      </div>
      <div class="field">
        <label>同居 判定</label>
        <input type="text" id="doukyo_hantei" value="${h.doukyo_hantei||''}">
      </div>
      <div class="field full">
        <label>別居の家族（続柄・年齢・仕事・健康・帰国・仕送りの必要性）</label>
        <textarea id="bekkyo_kazoku" rows="3">${h.bekkyo_kazoku||''}</textarea>
      </div>
      <div class="field">
        <label>別居 判定</label>
        <input type="text" id="bekkyo_hantei" value="${h.bekkyo_hantei||''}">
      </div>
    </div>
  </div>

  <!-- 入社歴 -->
  <div class="card">
    <div class="card-title">三菱自動車入社歴</div>
    <div class="card-body">
      <div class="field">
        <label>入社歴</label>

          <option value="">選択</option>

          <option value="ある（他社）" ${h.nyusha_umu==='ある（他社）'?'selected':''}>ある（他社）</option>

        <label>企業名</label>

      </div>
      <div class="field">
        <label>入社時期</label>
        <input type="text" id="nyusha_jiki" value="${h.nyusha_jiki||''}">
      </div>
      <div class="field">
        <label>退社時期</label>
        <input type="text" id="taisha_jiki" value="${h.taisha_jiki||''}">
      </div>
      <div class="field">
        <label>退社理由</label>
        <input type="text" id="taisha_riyu" value="${h.taisha_riyu||''}">
      </div>
      <div class="field">
        <label>判定</label>
        <input type="text" id="nyusha_hantei" value="${h.nyusha_hantei||''}">
      </div>
    </div>
  </div>

  <!-- 現職 -->
  <div class="card">

    <div class="card-body">
      <div class="field">

        <div class="radio-row">
          <label><input type="radio" name="genshoku_umu" value="あり" ${h.genshoku_umu==='あり'?'checked':''}> あり</label>
          <label><input type="radio" name="genshoku_umu" value="なし" ${h.genshoku_umu==='なし'?'checked':''}> なし</label>
        </div>
      </div>
      <div class="field">
        <label>就業状況</label>
        <select id="genshoku_status">
          <option value="">選択</option>
          <option value="正社員" ${h.genshoku_status==='正社員'?'selected':''}>正社員</option>
          <option value="派遣" ${h.genshoku_status==='派遣'?'selected':''}>派遣</option>
          <option value="アルバイト" ${h.genshoku_status==='アルバイト'?'selected':''}>アルバイト</option>

        <label>退職できる時期</label>

        <label>競合他社の検討状況</label>

      </div>

  </div>

  <!-- 勤務条件 -->
  <div class="card">
    <div class="card-title">勤務条件</div>
    <div class="card-body">
      <div class="field">
        <label>交代勤務</label>
        <div class="radio-row">
          <label><input type="radio" name="kotai_kinmu" value="可" ${h.kotai_kinmu==='可'?'checked':''}> 可</label>
          <label><input type="radio" name="kotai_kinmu" value="不可" ${h.kotai_kinmu==='不可'?'checked':''}> 不可</label>
        </div>
      </div>
      <div class="field">
        <label>交代勤務経験</label>

      </div>
      <div class="field">
        <label>引越し</label>
        <div class="radio-row">
          <label><input type="radio" name="hikkoshi" value="可" ${h.hikkoshi==='可'?'checked':''}> 可</label>
          <label><input type="radio" name="hikkoshi" value="不可" ${h.hikkoshi==='不可'?'checked':''}> 不可</label>

  <!-- 給与・応募動機 -->

    <div class="card-title">給与・応募動機</div>

      <div class="field full">
        <label>より高い給与を希望する理由</label>
        <textarea id="kyuyo_kibou_riyu" rows="2">${h.kyuyo_kibou_riyu||''}</textarea>
      </div>
      <div class="field full">
        <label>給与明細の控除（差し引き）の内容</label>
        <textarea id="kyuyo_kokyo" rows="2">${h.kyuyo_kokyo||''}</textarea>
      </div>
      <div class="field full">
        <label>応募動機（高収入を得なければならない理由・月々の返済・仕送り・治療費など）</label>
        <textarea id="obo_douki" rows="3">${h.obo_douki||''}</textarea>
      </div>

  </div>

  <!-- 職歴詳細 ①②③ -->
  ${[1,2,3].map(n => `
  <div class="card">
    <div class="card-title">職歴詳細 ${'①②③'[n-1]}</div>
    <div class="card-body">
      <div class="field">
        <label>開始</label>
        <div><input type="month" id="s${n}_kaishi" value="${h[`s${n}_kaishi`]||''}"><span class="print-date">${formatMonthJP(h[`s${n}_kaishi`])}</span></div>

      </div>
      <div class="field">
        <label>社名</label>
        <input type="text" id="s${n}_sha" value="${h[`s${n}_sha`]||''}">
      </div>

        <label>勤務地</label>
        <input type="text" id="s${n}_kinmuchi" value="${h[`s${n}_kinmuchi`]||''}">

        <input type="text" id="s${n}_taisha" value="${h[`s${n}_taisha`]||''}">
      </div>
      <div class="field full">
        <label>何を作っていたか・どんなことをしていたか</label>
        <textarea id="s${n}_naiyou" rows="2">${h[`s${n}_naiyou`]||''}</textarea>

        <label>部品の重さ・速さ・大変だった点・難しかった点</label>
        <textarea id="s${n}_taihen" rows="2">${h[`s${n}_taihen`]||''}</textarea>
      </div>
      <div class="field">
        <label>その仕事を始めた理由</label>
        <input type="text" id="s${n}_douki" value="${h[`s${n}_douki`]||''}">
      </div>
      <div class="field">
        <label>住居種類（当時）</label>
        <select id="s${n}_jutaku">
          <option value="">選択</option>
          <option value="賃貸アパート" ${h[`s${n}_jutaku`]==='賃貸アパート'?'selected':''}>賃貸アパート</option>
          <option value="自己所有" ${h[`s${n}_jutaku`]==='自己所有'?'selected':''}>自己所有</option>
          <option value="派遣アパート" ${h[`s${n}_jutaku`]==='派遣アパート'?'selected':''}>派遣アパート</option>

        <label>当時の家賃</label>

function setSaveStatus(text, cls) {
  const status = document.getElementById('saveStatus')
  if (!status) return
  status.textContent = text
  status.className = 'save-status' + (cls ? ' ' + cls : '')
}

async function salvar() {
  const btnSave = document.querySelector('.btn-save')
  const btnBack = document.querySelector('.btn-back')
  if (btnSave?.disabled) return false
  if (btnSave) btnSave.disabled = true
  if (btnBack) btnBack.disabled = true
  setSaveStatus('保存中...', 'saving')

  try {
  const hiariguBi = g('hiaringu_bi')
  const nyushaYoteiBi = g('nyusha_yotei_bi')

  const candidateUpdates = {}
  if (hiariguBi)     { candidateUpdates.dt_kengaku = hiariguBi }
  if (nyushaYoteiBi) { candidateUpdates.dt_nyusha = nyushaYoteiBi }

  if (Object.keys(candidateUpdates).length && candidateId) {
    const resCand = await sb.from('candidates').update(candidateUpdates).eq('id', candidateId).select('id')
    if (resCand.error) {
      console.error('Erro ao atualizar candidates:', resCand.error)
    } else if (!resCand.data || resCand.data.length === 0) {
      console.error('UPDATE candidates afetou 0 linhas — verifique RLS da tabela candidates')
    }
  }

  const payload = {
    candidate_id: candidateId,
    hiaringu_bi: hiariguBi,
    nyusha_yotei_bi: nyushaYoteiBi, mensadan_bi: g('mensadan_bi'), mensadan_sha: g('mensadan_sha'),
    jp_kaiwa: g('jp_kaiwa'), kanji_yomi: g('kanji_yomi'),
    hiragana_yomi: g('hiragana_yomi'), katakana_yomi: g('katakana_yomi'),
    jp_comment: g('jp_comment'), jp_hantei: g('jp_hantei'),
    shiryoku_migi: g('shiryoku_migi'), shiryoku_hidari: g('shiryoku_hidari'),
    megane_migi: g('megane_migi'), megane_hidari: g('megane_hidari'),
    kikite: r('kikite'), kiourekki: g('kiourekki'), shintai_hantei: g('shintai_hantei'),
    tattoo_umu: r('tattoo_umu'), tattoo_basho: g('tattoo_basho'), tattoo_taiou: g('tattoo_taiou'), tattoo_hantei: g('tattoo_hantei'),
    doukyo_kazoku: g('doukyo_kazoku'), doukyo_hantei: g('doukyo_hantei'),
    bekkyo_kazoku: g('bekkyo_kazoku'), bekkyo_hantei: g('bekkyo_hantei'),
    nyusha_umu: g('nyusha_umu'), nyusha_kigyo: g('nyusha_kigyo'), nyusha_jiki: g('nyusha_jiki'),
    taisha_jiki: g('taisha_jiki'), taisha_riyu: g('taisha_riyu'), nyusha_hantei: g('nyusha_hantei'),
    genshoku_umu: r('genshoku_umu'), genshoku_status: g('genshoku_status'),
    genshoku_taishoku: g('genshoku_taishoku'), kyogo_status: g('kyogo_status'),
    kotai_kinmu: r('kotai_kinmu'), kotai_keiken: r('kotai_keiken'),
    zangyou_taiou: r('zangyou_taiou'), zangyou_jikan: g('zangyou_jikan'),
    kyujitsu_shukkin: r('kyujitsu_shukkin'), kinmu_hantei: g('kinmu_hantei'),
    kinmu_comment: g('kinmu_comment'), zangyou_mondai: g('zangyou_mondai'), hayai_shukkin: g('hayai_shukkin'),
    genzai_jusho: g('genzai_jusho'),
    tsukin_houhou: g('tsukin_houhou'), tsukin_maker: g('tsukin_maker'),
    tsukin_kyori: g('tsukin_kyori'), tsukin_jikan: g('tsukin_jikan'),
    mae_kyori: g('mae_kyori'), tsukin_hantei: g('tsukin_hantei'),
    jutaku_shurui: g('jutaku_shurui'), kyoju_nensu: g('kyoju_nensu'),
    genzai_yachin: parseInt(g('genzai_yachin'))||null, hikkoshi: r('hikkoshi'),
    kyuyo_kibou_riyu: g('kyuyo_kibou_riyu'), kyuyo_kokyo: g('kyuyo_kokyo'), obo_douki: g('obo_douki'),
  }

  for (const n of [1,2,3]) {
    payload[`s${n}_kaishi`]    = g(`s${n}_kaishi`)
    payload[`s${n}_shuryo`]    = g(`s${n}_shuryo`)
    payload[`s${n}_sha`]       = g(`s${n}_sha`)
    payload[`s${n}_kinmuchi`]  = g(`s${n}_kinmuchi`)
    payload[`s${n}_jikyu`]     = parseInt(g(`s${n}_jikyu`))||null
    payload[`s${n}_sosshikyu`] = parseInt(g(`s${n}_sosshikyu`))||null
    payload[`s${n}_tedori`]    = parseInt(g(`s${n}_tedori`))||null
    payload[`s${n}_taisha`]    = g(`s${n}_taisha`)
    payload[`s${n}_naiyou`]    = g(`s${n}_naiyou`)
    payload[`s${n}_taihen`]    = g(`s${n}_taihen`)
    payload[`s${n}_douki`]     = g(`s${n}_douki`)
    payload[`s${n}_jutaku`]    = g(`s${n}_jutaku`)
    payload[`s${n}_yachin`]    = parseInt(g(`s${n}_yachin`))||null
  }

  let error
  if (hiariguId) {
    const res = await sb.from('hiaringu').update(payload).eq('id', hiariguId).select('id')
    error = res.error
    if (!error && (!res.data || res.data.length === 0)) {
      console.error('UPDATE afetou 0 linhas — verifique RLS da tabela hiaringu')
      setSaveStatus('❌ 保存失敗（権限エラー）', 'error')
      alert('⚠️ Erro de permissão: o registro não pôde ser atualizado.\nVerifique as políticas RLS da tabela hiaringu no Supabase.')
      return false
    }
  } else {
    const res = await sb.from('hiaringu').insert(payload).select('id').maybeSingle()
    error = res.error
    if (!error && res.data) hiariguId = res.data.id
  }

  if (error) {
    console.error('Supabase error:', error)
    setSaveStatus('❌ 保存失敗', 'error')
    alert('Erro ao salvar:\n' + error.message + (error.code ? '\nCódigo: ' + error.code : ''))
    return false
  }
  const now = new Date()
  setSaveStatus(`✅ 保存済み ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`, 'success')
  alert('✅ 保存完了!')
  return true
  } catch (e) {
    console.error('Erro de rede/inesperado ao salvar:', e)
    setSaveStatus('❌ 保存失敗（通信エラー）', 'error')
    alert('⚠️ 保存に失敗しました。ネットワーク接続を確認して、もう一度保存してください。\n\n' + (e?.message || e))
    return false
  } finally {
    if (btnSave) btnSave.disabled = false
    if (btnBack) btnBack.disabled = false
  }
}

async function salvarEFechar() {
  const ok = await salvar()
  if (!ok) return
  if (window.history.length > 1) history.back()
  else window.close()
}

carregar()
</script>
